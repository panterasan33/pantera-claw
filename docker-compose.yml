version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pantera
      POSTGRES_PASSWORD: pantera
      POSTGRES_DB: pantera
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantera"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  pantera:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://pantera:pantera@db:5432/pantera
    env_file:
      - .config/secrets.env
    volumes:
      - .:/app
    command: python main.py

volumes:
  pgdata:
  redisdata:
