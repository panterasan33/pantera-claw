<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantera — Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f6f3;
      --paper: #fdfcf9;
      --ink: #2a2a2a;
      --ink-light: #6b6b6b;
      --border: #e5e3df;
      --accent: #5c5346;
      --accent-soft: #9a9186;
      --column-bg: rgba(253, 252, 249, 0.6);
      --shadow: 0 1px 3px rgba(44, 42, 38, 0.04);
      --radius: 6px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-family: 'Noto Serif JP', serif;
      font-weight: 500;
      font-size: 1.5rem;
      letter-spacing: 0.02em;
      color: var(--ink);
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--ink-light);
      margin-top: 0.25rem;
      font-weight: 300;
    }

    .kanban {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      min-height: 400px;
    }

    .column {
      background: var(--column-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      min-height: 320px;
      transition: border-color 0.2s;
    }

    .column.drag-over {
      border-color: var(--accent-soft);
      background: rgba(156, 145, 134, 0.06);
    }

    .column-header {
      font-family: 'Noto Serif JP', serif;
      font-size: 0.75rem;
      font-weight: 500;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-light);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .column-title {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .column-toggle {
      border: 1px solid var(--border);
      background: var(--paper);
      color: var(--ink-light);
      border-radius: 999px;
      padding: 0.12rem 0.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .column-toggle:hover {
      color: var(--ink);
      border-color: var(--accent-soft);
    }

    .column.collapsed {
      min-height: 0;
      align-self: start;
    }

    .column.collapsed .cards,
    .column.collapsed .add-task,
    .column.collapsed .add-form {
      display: none;
    }

    .column-header .count {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      font-size: 0.7rem;
      opacity: 0.7;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .card-swipe-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
    }

    .card-swipe-actions {
      position: absolute;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: stretch;
      pointer-events: none;
    }

    .card-swipe-actions.left {
      left: 0;
      transform: translateX(-100%);
    }

    .card-swipe-actions.right {
      right: 0;
      transform: translateX(100%);
    }

    .card-swipe-actions .swipe-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: #fff;
      pointer-events: all;
      gap: 0.25rem;
      flex-direction: column;
      font-family: inherit;
    }

    .swipe-btn span {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .swipe-btn.delete { background: #c0392b; }
    .swipe-btn.done   { background: #27ae60; }

    .card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      cursor: grab;
      transition: box-shadow 0.15s, border-color 0.15s, transform 0.0s;
      box-shadow: var(--shadow);
      position: relative;
      will-change: transform;
      touch-action: pan-y;
    }

    .card:hover {
      border-color: var(--accent-soft);
      box-shadow: 0 2px 8px rgba(44, 42, 38, 0.06);
    }

    .card.dragging {
      opacity: 0.6;
      cursor: grabbing;
      box-shadow: 0 4px 12px rgba(44, 42, 38, 0.12);
    }

    .card-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--ink);
    }

    .card-meta {
      font-size: 0.7rem;
      color: var(--ink-light);
      margin-top: 0.35rem;
    }

    .card-actions {
      margin-top: 0.5rem;
      display: flex;
      gap: 0.5rem;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .card:hover .card-actions {
      opacity: 1;
    }

    .btn-icon {
      background: none;
      border: none;
      color: var(--ink-light);
      cursor: pointer;
      padding: 0.35rem 0.5rem;
      font-size: 0.9rem;
      border-radius: 3px;
      transition: color 0.15s, background 0.15s;
      min-width: 1.75rem;
      min-height: 1.75rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon:hover {
      color: var(--ink);
      background: rgba(0,0,0,0.04);
    }

    .add-task {
      margin-top: 1rem;
      width: 100%;
      padding: 0.6rem 1rem;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--ink-light);
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .add-task:hover {
      border-color: var(--accent-soft);
      color: var(--ink);
    }

    .add-form {
      margin-top: 0.5rem;
      display: none;
    }

    .add-form.visible {
      display: block;
    }

    .add-form input,
    .add-form textarea {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      background: var(--paper);
    }

    .add-form input:focus,
    .add-form textarea:focus {
      outline: none;
      border-color: var(--accent-soft);
    }

    .add-form textarea {
      min-height: 60px;
      resize: vertical;
    }

    .add-form-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn {
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--paper);
      color: var(--ink);
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-primary {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    .btn-primary:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    .inbox-toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 0.75rem;
    }

    .inbox-filter {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--paper);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.4rem 0.6rem;
    }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--ink-light);
      font-size: 0.85rem;
      font-weight: 300;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--ink-light);
      font-size: 0.9rem;
    }


    .nav {
      position: relative;
      display: inline-block;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      min-width: 220px;
    }

    .nav-current {
      background: transparent;
      border: none;
      color: var(--ink);
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0;
    }

    .nav-menu {
      position: absolute;
      top: 1.8rem;
      left: 0;
      display: none;
      flex-direction: column;
      gap: 0.35rem;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem;
      box-shadow: var(--shadow);
      z-index: 4;
    }

    .nav.open .nav-menu {
      display: flex;
    }

    .task-detail {
      position: fixed;
      right: 0;
      top: 0;
      width: min(420px, 92vw);
      height: 100vh;
      background: var(--paper);
      border-left: 1px solid var(--border);
      box-shadow: -6px 0 20px rgba(44,42,38,0.08);
      padding: 1.1rem;
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 8;
      overflow-y: auto;
    }

    .task-detail.open { transform: translateX(0); }
    .task-bar { height: 3px; margin-top: 0.7rem; border-radius: 999px; background: rgba(92,83,70,0.2);}
    .subtasks { margin-top: 0.8rem; display:flex; flex-direction:column; gap:0.45rem; }
    .subtask-item { display:flex; gap:0.5rem; align-items:center; font-size:0.85rem;}

    .nav-link {
      font-size: 0.8rem;
      color: var(--ink-light);
      text-decoration: none;
      font-family: inherit;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }

    .nav-link:hover {
      color: var(--ink);
    }

    .nav-link.active {
      color: var(--ink);
      font-weight: 500;
      border-bottom: 1px solid var(--ink);
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .list-view .cards {
      max-width: 600px;
    }

    .list-view .card {
      cursor: default;
    }

    .list-view .card[draggable="true"] {
      cursor: grab;
    }

    .settings-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }

    .settings-item:last-child {
      border-bottom: none;
    }

    .settings-item label {
      font-size: 0.9rem;
      cursor: pointer;
      flex: 1;
    }

    .toggle {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: var(--border);
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle.on {
      background: var(--accent);
    }

    .toggle::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--paper);
      top: 2px;
      left: 2px;
      transition: left 0.2s;
      box-shadow: var(--shadow);
    }

    .toggle.on::after {
      left: 18px;
    }

    .search-input {
      width: 100%;
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.9rem;
      background: var(--paper);
    }

    .search-form {
      width: 100%;
      max-width: 520px;
      display: flex;
      gap: 0.5rem;
      align-items: stretch;
      margin-bottom: 0.75rem;
    }

    .search-form .search-input {
      flex: 1;
      min-width: 0;
    }

    .search-status {
      min-height: 1.2rem;
      font-size: 0.8rem;
      color: var(--ink-light);
      margin-bottom: 0.4rem;
    }

    .search-status.loading::before {
      content: '⏳ ';
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent-soft);
    }

    .search-results {
      margin-top: 1rem;
    }

    .search-result-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .search-result-item .type {
      font-size: 0.7rem;
      color: var(--ink-light);
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }

    [data-theme="dark"] {
      --bg: #1a1917;
      --paper: #242220;
      --ink: #e8e6e1;
      --ink-light: #9a9186;
      --border: #3a3835;
      --accent: #c8a035;
      --accent-soft: #6e6659;
      --column-bg: rgba(36, 34, 32, 0.8);
    }

    .priority-badge {
      display: inline-block;
      font-size: 0.62rem;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-top: 0.2rem;
    }
    .priority-high { background: #fde8e8; color: #c0392b; }
    .priority-medium { background: #fef3cd; color: #9a6e00; }
    .priority-low { background: #e8f4e8; color: #2e7d32; }
    [data-theme="dark"] .priority-high { background: #3d1a1a; color: #e57373; }
    [data-theme="dark"] .priority-medium { background: #3d3010; color: #ffd54f; }
    [data-theme="dark"] .priority-low { background: #1a3d1a; color: #81c784; }

    .btn-star { color: var(--ink-light); font-size: 1rem; line-height: 1; padding: 0; }
    .btn-star.starred { color: #c8a035; }

    .tasks-toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.8rem;
      color: var(--ink-light);
    }
    .tasks-toolbar select {
      font-size: 0.8rem;
      padding: 0.2rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--paper);
      color: var(--ink);
      cursor: pointer;
    }
    .nav-divider { border: none; border-top: 1px solid var(--border); margin: 0.25rem 0; }
    .list-color-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      background: var(--accent-soft);
    }

    @media (max-width: 768px) {
      .kanban {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Pantera</h1>
      <p class="subtitle" id="view-subtitle">Tasks</p>
      <nav class="nav">
        <button class="nav-current" id="nav-current" aria-expanded="false">Tasks ▾</button>
        <div class="nav-menu" id="nav-menu">
          <button class="nav-link active" data-view="tasks">Tasks</button>
          <button class="nav-link" data-view="important">★ Important</button>
          <button class="nav-link" data-view="today">Planned for Today</button>
          <hr class="nav-divider">
          <button class="nav-link" data-view="reminders">Reminders</button>
          <button class="nav-link" data-view="inbox">Inbox</button>
          <button class="nav-link" data-view="memory">Memory</button>
          <hr class="nav-divider">
          <div id="nav-lists"></div>
          <hr class="nav-divider">
          <button class="nav-link" data-view="search">Search</button>
          <button class="nav-link" data-view="settings">Settings</button>
        </div>
      </nav>
    </header>

    <div class="view active" id="view-tasks" data-view="tasks">
    <div class="tasks-toolbar">
      <label for="sort-select">Sort:</label>
      <select id="sort-select">
        <option value="created">Date Added</option>
        <option value="due_date">Due Date</option>
        <option value="priority">Priority</option>
        <option value="important">Importance</option>
        <option value="alpha">Alphabetical</option>
      </select>
    </div>
    <div class="kanban">
      <div class="column" data-status="not_started">
        <div class="column-header">
          <span class="column-title">Not Started <span class="count" id="count-not_started">0</span></span>
          <button class="column-toggle" data-toggle-column="not_started" aria-expanded="true">Shrink</button>
        </div>
        <div class="cards" id="cards-not_started"></div>
        <button class="add-task" data-status="not_started">+ Add task</button>
        <div class="add-form" id="form-not_started">
          <input type="text" placeholder="Task title" id="input-not_started">
          <textarea placeholder="Notes (optional)" id="notes-not_started"></textarea>
          <input type="text" placeholder="Due date (e.g. tomorrow, next Mon)" id="due-not_started">
          <select id="priority-not_started">
            <option value="none">No priority</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <div class="add-form-actions">
            <button class="btn btn-primary" data-save="not_started">Add</button>
            <button class="btn" data-cancel="not_started">Cancel</button>
          </div>
        </div>
      </div>

      <div class="column" data-status="in_progress">
        <div class="column-header">
          <span class="column-title">In Progress <span class="count" id="count-in_progress">0</span></span>
          <button class="column-toggle" data-toggle-column="in_progress" aria-expanded="true">Shrink</button>
        </div>
        <div class="cards" id="cards-in_progress"></div>
        <button class="add-task" data-status="in_progress">+ Add task</button>
        <div class="add-form" id="form-in_progress">
          <input type="text" placeholder="Task title" id="input-in_progress">
          <textarea placeholder="Notes (optional)" id="notes-in_progress"></textarea>
          <input type="text" placeholder="Due date (e.g. tomorrow, next Mon)" id="due-in_progress">
          <select id="priority-in_progress">
            <option value="none">No priority</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <div class="add-form-actions">
            <button class="btn btn-primary" data-save="in_progress">Add</button>
            <button class="btn" data-cancel="in_progress">Cancel</button>
          </div>
        </div>
      </div>

      <div class="column" data-status="done">
        <div class="column-header">
          <span class="column-title">Done <span class="count" id="count-done">0</span></span>
          <button class="column-toggle" data-toggle-column="done" aria-expanded="false">Expand</button>
        </div>
        <div class="cards" id="cards-done"></div>
        <button class="add-task" data-status="done">+ Add task</button>
        <div class="add-form" id="form-done">
          <input type="text" placeholder="Task title" id="input-done">
          <textarea placeholder="Notes (optional)" id="notes-done"></textarea>
          <input type="text" placeholder="Due date (e.g. tomorrow, next Mon)" id="due-done">
          <select id="priority-done">
            <option value="none">No priority</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <div class="add-form-actions">
            <button class="btn btn-primary" data-save="done">Add</button>
            <button class="btn" data-cancel="done">Cancel</button>
          </div>
        </div>
      </div>
    </div>
    </div>

    <div class="view list-view" id="view-important" data-view="important">
      <div class="cards" id="cards-important"></div>
    </div>

    <div class="view list-view" id="view-reminders" data-view="reminders">
      <div class="cards" id="cards-reminders"></div>
      <button class="add-task" id="add-reminder-btn">+ Add reminder</button>
      <div class="add-form" id="form-reminder">
        <input type="text" placeholder="Reminder content" id="input-reminder-content">
        <input type="text" placeholder="When (e.g. tomorrow 9am)" id="input-reminder-trigger">
        <div class="add-form-actions">
          <button class="btn btn-primary" id="save-reminder">Add</button>
          <button class="btn" id="cancel-reminder">Cancel</button>
        </div>
      </div>
    </div>

    <div class="view list-view" id="view-inbox" data-view="inbox">
      <div class="inbox-toolbar">
        <select id="inbox-filter" class="inbox-filter" aria-label="Filter inbox items">
          <option value="all">All</option>
          <option value="false">Unprocessed</option>
          <option value="true">Processed</option>
        </select>
      </div>
      <div class="cards" id="cards-inbox"></div>
    </div>

    <div class="view list-view" id="view-memory" data-view="memory">
      <div class="cards" id="cards-memory"></div>
      <button class="add-task" id="add-memory-btn">+ Add memory</button>
      <div class="add-form" id="form-memory">
        <input type="text" placeholder="Content" id="input-memory-content">
        <select id="input-memory-type">
          <option value="note">Note</option>
          <option value="birthday">Birthday</option>
          <option value="annual_event">Annual event</option>
        </select>
        <input type="text" placeholder="Date (MM/DD or YYYY-MM-DD)" id="input-memory-date">
        <div class="add-form-actions">
          <button class="btn btn-primary" id="save-memory">Add</button>
          <button class="btn" id="cancel-memory">Cancel</button>
        </div>
      </div>
    </div>

    <div class="view list-view" id="view-today" data-view="today">
      <div class="cards" id="cards-today"></div>
    </div>

    <div class="view" id="view-search" data-view="search">
      <form id="search-form" class="search-form">
        <input type="text" class="search-input" id="search-input" placeholder="Search..." aria-label="Search query">
        <button type="submit" class="btn btn-primary" id="search-button">Search</button>
      </form>
      <div class="search-status" id="search-status" aria-live="polite"></div>
      <div class="search-results" id="search-results"></div>
    </div>

    <div class="view" id="view-settings" data-view="settings">
      <div class="settings-list">
        <div class="settings-item">
          <label for="toggle-notes">Show notes on cards</label>
          <div class="toggle" id="toggle-notes" data-setting="showNotes"></div>
        </div>
        <div class="settings-item">
          <label for="toggle-project">Show project on cards</label>
          <div class="toggle" id="toggle-project" data-setting="showProject"></div>
        </div>
        <div class="settings-item">
          <label for="toggle-due">Show due date on cards</label>
          <div class="toggle" id="toggle-due" data-setting="showDueDate"></div>
        </div>
        <div class="settings-item">
          <label for="toggle-dark">Dark mode</label>
          <div class="toggle" id="toggle-dark" data-setting="darkMode"></div>
        </div>
      </div>
    </div>
  </div>

  <aside class="task-detail" id="task-detail">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <button class="btn" id="close-detail">← Back</button>
      <button class="btn" id="delete-detail" style="color:#c0392b; border-color:#c0392b;">Delete</button>
    </div>
    <input type="text" id="detail-title" placeholder="Task title" style="width:100%; margin-top:0.8rem; font-family:'Noto Serif JP',serif; font-size:1rem; font-weight:500; border:none; border-bottom:2px solid var(--border); background:transparent; color:var(--ink); padding:0.25rem 0; outline:none;">
    <div class="task-bar"></div>
    <div style="display:flex; gap:0.5rem; margin-top:0.8rem; align-items:center; flex-wrap:wrap;">
      <button class="btn-icon btn-star" id="detail-star" title="Mark important">☆</button>
      <select id="detail-status" style="font-size:0.8rem; padding:0.2rem 0.4rem; border:1px solid var(--border); border-radius:var(--radius); background:var(--paper); color:var(--ink);">
        <option value="not_started">Not started</option>
        <option value="in_progress">In progress</option>
        <option value="done">Done</option>
      </select>
      <select id="detail-priority" style="font-size:0.8rem; padding:0.2rem 0.4rem; border:1px solid var(--border); border-radius:var(--radius); background:var(--paper); color:var(--ink);">
        <option value="none">No priority</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
    </div>
    <div style="display:flex; gap:0.5rem; margin-top:0.6rem;">
      <input type="text" id="detail-due" placeholder="Due date (e.g. tomorrow, 2025-12-31)" style="flex:1; font-size:0.8rem;">
      <input type="text" id="detail-project" placeholder="Project" style="flex:1; font-size:0.8rem;">
    </div>
    <textarea id="detail-notes" placeholder="Notes" style="width:100%; margin-top:0.6rem; min-height:100px;"></textarea>
    <div class="add-form-actions" style="margin-top:0.5rem;">
      <button class="btn btn-primary" id="save-detail">Save changes</button>
    </div>
    <h4 style="margin-top:1.2rem; font-size:0.75rem; color:var(--ink-light); text-transform:uppercase; letter-spacing:0.06em;">Checklist</h4>
    <div class="subtasks" id="subtasks"></div>
    <div class="add-form-actions" style="margin-top:0.6rem;">
      <input id="new-subtask" placeholder="Add subtask" style="flex:1;" />
      <button class="btn" id="add-subtask">Add</button>
    </div>
  </aside>

  <script>
    const API = '/api';
    const STATUSES = ['not_started', 'in_progress', 'done'];
    const VIEW_TITLES = {
      tasks: 'Tasks',
      important: 'Important',
      reminders: 'Reminders',
      inbox: 'Inbox',
      memory: 'Memory',
      today: 'Planned for Today',
      search: 'Search',
      settings: 'Settings'
    };

    let tasks = [];
    let subtasksByParent = {};
    let selectedTaskId = null;
    let draggedTask = null;
    let draggedFromColumn = null;
    let inboxFilter = 'all';
    let currentSort = localStorage.getItem('pantera_sort') || 'created';
    let taskLists = [];

    function getColumnVisibility() {
      try {
        const saved = JSON.parse(localStorage.getItem('pantera_column_visibility') || '{}');
        return {
          not_started: saved.not_started !== false,
          in_progress: saved.in_progress !== false,
          done: saved.done === true ? true : false
        };
      } catch {
        return { not_started: true, in_progress: true, done: false };
      }
    }

    function setColumnVisibility(status, isExpanded) {
      const current = getColumnVisibility();
      current[status] = isExpanded;
      localStorage.setItem('pantera_column_visibility', JSON.stringify(current));
    }

    function applyColumnVisibility() {
      const visibility = getColumnVisibility();
      document.querySelectorAll('.column').forEach(column => {
        const status = column.dataset.status;
        const expanded = visibility[status] !== false;
        column.classList.toggle('collapsed', !expanded);
      });
      document.querySelectorAll('[data-toggle-column]').forEach(button => {
        const status = button.dataset.toggleColumn;
        const expanded = visibility[status] !== false;
        button.textContent = expanded ? 'Shrink' : 'Expand';
        button.setAttribute('aria-expanded', expanded ? 'true' : 'false');
      });
    }

    function getSettings() {
      try {
        const s = JSON.parse(localStorage.getItem('pantera_settings') || '{}');
        return {
          showNotes: s.showNotes !== false,
          showProject: s.showProject !== false,
          showDueDate: s.showDueDate !== false,
          darkMode: s.darkMode === true
        };
      } catch {
        return { showNotes: true, showProject: true, showDueDate: true, darkMode: false };
      }
    }

    function applyDarkMode() {
      const isDark = getSettings().darkMode;
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    }
    applyDarkMode();

    function setSetting(key, value) {
      const s = getSettings();
      s[key] = value;
      localStorage.setItem('pantera_settings', JSON.stringify(s));
      render();
      if (typeof renderReminders === 'function') renderReminders();
      if (typeof renderInbox === 'function') renderInbox();
      if (typeof renderMemory === 'function') renderMemory();
      if (typeof renderToday === 'function') renderToday();
    }

    function setActiveView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      const view = document.getElementById(`view-${viewId}`);
      const link = document.querySelector(`.nav-link[data-view="${viewId}"]`);
      if (view) view.classList.add('active');
      if (link) link.classList.add('active');
      const subtitle = document.getElementById('view-subtitle');
      if (subtitle) subtitle.textContent = VIEW_TITLES[viewId] || viewId;
      const current = document.getElementById('nav-current');
      if (current) current.textContent = `${VIEW_TITLES[viewId] || viewId} ▾`;
      document.title = `Pantera — ${VIEW_TITLES[viewId] || viewId}`;
      if (viewId === 'reminders') fetchReminders?.();
      if (viewId === 'inbox') fetchInbox?.();
      if (viewId === 'memory') fetchMemory?.();
      if (viewId === 'today') fetchToday?.();
      if (viewId === 'important') fetchImportant?.();
    }

    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', () => {
        setActiveView(link.dataset.view);
        document.querySelector('.nav')?.classList.remove('open');
      });
    });
    document.getElementById('nav-current')?.addEventListener('click', () => {
      document.querySelector('.nav')?.classList.toggle('open');
    });

    document.querySelectorAll('.toggle').forEach(toggle => {
      toggle.addEventListener('click', () => {
        const key = toggle.dataset.setting;
        const settings = getSettings();
        const next = !settings[key];
        settings[key] = next;
        localStorage.setItem('pantera_settings', JSON.stringify(settings));
        toggle.classList.toggle('on', next);
        if (key === 'darkMode') applyDarkMode();
        render();
      });
    });

    document.querySelectorAll('.settings-item').forEach(item => {
      const label = item.querySelector('label');
      const toggle = item.querySelector('.toggle');
      if (label && toggle) label.addEventListener('click', () => toggle.click());
    });

    function initSettingsToggles() {
      const s = getSettings();
      document.querySelectorAll('.toggle').forEach(toggle => {
        const key = toggle.dataset.setting;
        toggle.classList.toggle('on', s[key]);
      });
    }
    initSettingsToggles();
    applyColumnVisibility();

    document.querySelectorAll('[data-toggle-column]').forEach(button => {
      button.addEventListener('click', () => {
        const status = button.dataset.toggleColumn;
        const visibility = getColumnVisibility();
        const nextExpanded = !(visibility[status] !== false);
        setColumnVisibility(status, nextExpanded);
        applyColumnVisibility();
      });
    });

    async function fetchTasks() {
      const res = await fetch(`${API}/tasks?sort=${currentSort}`);
      if (!res.ok) throw new Error('Failed to fetch tasks');
      tasks = await res.json();
      render();
    }

    async function fetchImportant() {
      try {
        const res = await fetch(`${API}/tasks?is_important=true&sort=${currentSort}`);
        const data = res.ok ? await res.json() : [];
        renderImportant(data);
      } catch { renderImportant([]); }
    }
    function renderImportant(list) {
      const el = document.getElementById('cards-important');
      if (!el) return;
      if (!list.length) { el.innerHTML = '<div class="empty-state">No important tasks</div>'; return; }
      el.innerHTML = '';
      list.forEach(task => el.appendChild(createCard(task)));
    }

    async function fetchLists() {
      try {
        const res = await fetch(`${API}/lists`);
        taskLists = res.ok ? await res.json() : [];
        renderListsInNav();
      } catch { taskLists = []; }
    }
    function renderListsInNav() {
      const el = document.getElementById('nav-lists');
      if (!el) return;
      el.innerHTML = taskLists.map(l => {
        const dot = l.color ? `<span class="list-color-dot" style="background:${l.color}"></span>` : '<span class="list-color-dot"></span>';
        const icon = l.icon ? l.icon + ' ' : '';
        return `<button class="nav-link" data-view="list-${l.id}">${dot}${icon}${escapeHtml(l.name)}</button>`;
      }).join('');
      el.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', () => {
          const listId = parseInt(link.dataset.view.replace('list-', ''));
          const listObj = taskLists.find(l => l.id === listId);
          VIEW_TITLES[link.dataset.view] = listObj?.name || 'List';
          setActiveView(link.dataset.view);
          fetchListTasks(listId, link.dataset.view);
          document.querySelector('.nav')?.classList.remove('open');
        });
      });
    }
    async function fetchListTasks(listId, viewId) {
      try {
        const res = await fetch(`${API}/tasks?list_id=${listId}&sort=${currentSort}`);
        const data = res.ok ? await res.json() : [];
        let el = document.getElementById(`view-${viewId}`);
        if (!el) {
          el = document.createElement('div');
          el.className = 'view list-view';
          el.id = `view-${viewId}`;
          el.dataset.view = viewId;
          document.querySelector('.app').insertBefore(el, document.getElementById('task-detail'));
        }
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        el.classList.add('active');
        el.innerHTML = data.length ? '' : '<div class="empty-state">No tasks in this list</div>';
        data.forEach(task => { const card = createCard(task); el.appendChild(card); });
      } catch (e) { console.error(e); }
    }

    async function fetchSubtasks(parentId) {
      const res = await fetch(`${API}/tasks?parent_id=${parentId}`);
      if (!res.ok) return [];
      return await res.json();
    }

    async function openTaskSidebar(task) {
      selectedTaskId = task.id;
      document.getElementById('detail-title').value = task.title;
      document.getElementById('detail-notes').value = task.notes || '';
      document.getElementById('task-detail').classList.add('open');
      // Populate priority, star, due date, project
      const btn = document.getElementById('detail-star');
      if (btn) { btn.textContent = task.is_important ? '★' : '☆'; btn.classList.toggle('starred', !!task.is_important); }
      const pri = document.getElementById('detail-priority');
      if (pri) pri.value = task.priority || 'none';
      const due = document.getElementById('detail-due');
      if (due) due.value = task.due_date ? new Date(task.due_date).toLocaleDateString() : '';
      const proj = document.getElementById('detail-project');
      if (proj) proj.value = task.project || '';
      const statusEl = document.getElementById('detail-status');
      if (statusEl) statusEl.value = task.status || 'not_started';
      subtasksByParent[task.id] = await fetchSubtasks(task.id);
      renderSubtasks(task.id);
    }

    function renderSubtasks(parentId) {
      const el = document.getElementById('subtasks');
      const list = subtasksByParent[parentId] || [];
      el.innerHTML = list.map(s => `<label class="subtask-item"><input type="checkbox" ${s.status === 'done' ? 'checked' : ''} data-subtoggle="${s.id}"> ${escapeHtml(s.title)}</label>`).join('') || '<div class="card-meta">No subtasks yet</div>';
      el.querySelectorAll('[data-subtoggle]').forEach(c => c.addEventListener('change', async () => {
        const id = parseInt(c.dataset.subtoggle);
        await fetch(`${API}/tasks/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: c.checked ? 'done' : 'not_started' }) });
        if (selectedTaskId) {
          subtasksByParent[selectedTaskId] = await fetchSubtasks(selectedTaskId);
          renderSubtasks(selectedTaskId);
        }
      }));
    }

    function render() {
      STATUSES.forEach(status => {
        const list = tasks.filter(t => t.status === status);
        const container = document.getElementById(`cards-${status}`);
        const countEl = document.getElementById(`count-${status}`);
        countEl.textContent = list.length;
        container.innerHTML = '';
        if (list.length === 0) {
          container.innerHTML = '<div class="empty-state">No tasks</div>';
        } else {
          list.forEach(task => {
            container.appendChild(createCard(task));
          });
        }
      });
    }

    function createCard(task) {
      // Outer swipe wrapper
      const wrapper = document.createElement('div');
      wrapper.className = 'card-swipe-wrapper';

      // Left reveal: done action
      const leftActions = document.createElement('div');
      leftActions.className = 'card-swipe-actions left';
      leftActions.innerHTML = `<button class="swipe-btn done" title="Mark done">✓<span>Done</span></button>`;
      wrapper.appendChild(leftActions);

      // Right reveal: delete action
      const rightActions = document.createElement('div');
      rightActions.className = 'card-swipe-actions right';
      rightActions.innerHTML = `<button class="swipe-btn delete" title="Delete">×<span>Delete</span></button>`;
      wrapper.appendChild(rightActions);

      const div = document.createElement('div');
      div.className = 'card';
      div.draggable = true;
      div.dataset.id = task.id;
      div.dataset.status = task.status;
      wrapper.appendChild(div);

      const s = getSettings();
      const parts = [];
      if (s.showProject && task.project) parts.push(task.project);
      if (s.showDueDate && task.due_date) parts.push(new Date(task.due_date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }));
      const meta = parts.join(' · ');
      const showNotes = s.showNotes && task.notes;

      const priorityBadge = (task.priority && task.priority !== 'none')
        ? `<span class="priority-badge priority-${task.priority}">${task.priority}</span>` : '';

      div.innerHTML = `
        <div class="card-title">${escapeHtml(task.title)}</div>
        ${meta ? `<div class="card-meta">${escapeHtml(meta)}</div>` : ''}
        ${priorityBadge}
        ${showNotes ? `<div class="card-meta">${escapeHtml(task.notes)}</div>` : ''}
        <div class="card-actions">
          <button class="btn-icon" data-toggle-done="${task.id}" title="${task.status === 'done' ? 'Mark not done' : 'Mark done'}">${task.status === 'done' ? '↺' : '✓'}</button>
          <button class="btn-icon btn-star${task.is_important ? ' starred' : ''}" data-star="${task.id}" title="Mark important">${task.is_important ? '★' : '☆'}</button>
          <button class="btn-icon" data-myday="${task.id}" title="Add to My Day">${task.my_day ? '☀️' : '◯'}</button>
          <button class="btn-icon" data-delete="${task.id}" title="Delete">×</button>
        </div>
        <div class="task-bar"></div>
      `;

      div.addEventListener('click', () => openTaskSidebar(task));
      div.addEventListener('dragstart', onDragStart);
      div.addEventListener('dragend', onDragEnd);
      div.querySelector('[data-delete]')?.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteTask(task.id);
      });
      div.querySelector('[data-toggle-done]')?.addEventListener('click', async (e) => {
        e.stopPropagation();
        try {
          const nextStatus = task.status === 'done' ? 'not_started' : 'done';
          await fetch(`${API}/tasks/${task.id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: nextStatus })
          });
          await fetchTasks();
        } catch (err) { console.error(err); }
      });
      div.querySelector('[data-star]')?.addEventListener('click', async (e) => {
        e.stopPropagation();
        try {
          await fetch(`${API}/tasks/${task.id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ is_important: !task.is_important }) });
          await fetchTasks();
        } catch (err) { console.error(err); }
      });
      div.querySelector('[data-myday]')?.addEventListener('click', async (e) => {
        e.stopPropagation();
        try {
          await fetch(`${API}/tasks/${task.id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ my_day: true }) });
          await fetchTasks();
          fetchToday?.();
        } catch (err) { console.error(err); }
      });

      // Swipe reveal action buttons
      leftActions.querySelector('.swipe-btn.done').addEventListener('click', async () => {
        const nextStatus = task.status === 'done' ? 'not_started' : 'done';
        await fetch(`${API}/tasks/${task.id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: nextStatus }) });
        await fetchTasks();
      });
      rightActions.querySelector('.swipe-btn.delete').addEventListener('click', () => deleteTask(task.id));

      // Touch swipe handling
      addSwipeGesture(div, leftActions, rightActions);

      return wrapper;
    }

    function addSwipeGesture(card, leftActions, rightActions) {
      const THRESHOLD = 60;
      const MAX_REVEAL = 80;
      let startX = 0, startY = 0, currentX = 0, swiping = false, swipeDir = 0;

      card.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        currentX = 0;
        swiping = false;
        swipeDir = 0;
        card.style.transition = 'none';
      }, { passive: true });

      card.addEventListener('touchmove', (e) => {
        const dx = e.touches[0].clientX - startX;
        const dy = e.touches[0].clientY - startY;
        if (!swiping && Math.abs(dy) > Math.abs(dx)) return; // vertical scroll
        swiping = true;
        swipeDir = dx > 0 ? 1 : -1;
        currentX = Math.max(-MAX_REVEAL, Math.min(MAX_REVEAL, dx));
        card.style.transform = `translateX(${currentX}px)`;
        // Reveal action panels proportionally
        if (currentX > 0) {
          leftActions.style.transform = `translateX(0)`;
          leftActions.style.width = `${currentX}px`;
          leftActions.style.pointerEvents = 'none';
          rightActions.style.transform = `translateX(100%)`;
        } else if (currentX < 0) {
          rightActions.style.transform = `translateX(0)`;
          rightActions.style.width = `${-currentX}px`;
          rightActions.style.pointerEvents = 'none';
          leftActions.style.transform = `translateX(-100%)`;
        }
        if (Math.abs(currentX) > 10) e.preventDefault();
      }, { passive: false });

      card.addEventListener('touchend', () => {
        card.style.transition = 'transform 0.25s ease';
        if (Math.abs(currentX) >= THRESHOLD) {
          // Snap to reveal
          card.style.transform = `translateX(${swipeDir * MAX_REVEAL}px)`;
          if (swipeDir > 0) {
            leftActions.style.width = `${MAX_REVEAL}px`;
            leftActions.style.pointerEvents = 'all';
          } else {
            rightActions.style.width = `${MAX_REVEAL}px`;
            rightActions.style.pointerEvents = 'all';
          }
        } else {
          // Snap back
          card.style.transform = '';
          leftActions.style.transform = 'translateX(-100%)';
          leftActions.style.width = '';
          rightActions.style.transform = 'translateX(100%)';
          rightActions.style.width = '';
          leftActions.style.pointerEvents = 'none';
          rightActions.style.pointerEvents = 'none';
        }
        swiping = false;
      });

      // Tap on card to reset swipe if revealed
      card.addEventListener('click', (e) => {
        if (Math.abs(currentX) >= THRESHOLD) {
          e.stopPropagation();
          card.style.transition = 'transform 0.25s ease';
          card.style.transform = '';
          leftActions.style.transform = 'translateX(-100%)';
          leftActions.style.width = '';
          rightActions.style.transform = 'translateX(100%)';
          rightActions.style.width = '';
          leftActions.style.pointerEvents = 'none';
          rightActions.style.pointerEvents = 'none';
          currentX = 0;
        }
      });
    }

    function escapeHtml(s) {
      const el = document.createElement('div');
      el.textContent = s;
      return el.innerHTML;
    }

    function onDragStart(e) {
      draggedTask = tasks.find(t => t.id === parseInt(e.target.dataset.id));
      draggedFromColumn = e.target.closest('.column');
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', e.target.dataset.id);
    }

    function onDragEnd(e) {
      e.target.classList.remove('dragging');
      document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
      draggedTask = null;
      draggedFromColumn = null;
    }

    document.querySelectorAll('.column').forEach(col => {
      col.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        col.classList.add('drag-over');
      });
      col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
      col.addEventListener('drop', (e) => {
        e.preventDefault();
        col.classList.remove('drag-over');
        const id = e.dataTransfer.getData('text/plain');
        const newStatus = col.dataset.status;
        if (id && draggedTask && draggedTask.status !== newStatus) {
          updateTaskStatus(parseInt(id), newStatus);
        }
      });
    });

    async function updateTaskStatus(id, status) {
      try {
        const res = await fetch(`${API}/tasks/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        if (!res.ok) throw new Error('Update failed');
        await fetchTasks();
      } catch (err) {
        console.error(err);
      }
    }

    async function deleteTask(id) {
      if (!confirm('Delete this task?')) return;
      try {
        const res = await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Delete failed');
        await fetchTasks();
      } catch (err) {
        console.error(err);
      }
    }

    document.querySelectorAll('.add-task').forEach(btn => {
      btn.addEventListener('click', () => {
        const status = btn.dataset.status;
        document.getElementById(`form-${status}`).classList.add('visible');
        btn.style.display = 'none';
        document.getElementById(`input-${status}`).focus();
      });
    });

    document.querySelectorAll('[data-cancel]').forEach(btn => {
      btn.addEventListener('click', () => {
        const status = btn.dataset.cancel;
        document.getElementById(`form-${status}`).classList.remove('visible');
        document.querySelector(`.add-task[data-status="${status}"]`).style.display = 'block';
        document.getElementById(`input-${status}`).value = '';
        document.getElementById(`notes-${status}`).value = '';
        const dueEl = document.getElementById(`due-${status}`);
        if (dueEl) dueEl.value = '';
        const priEl = document.getElementById(`priority-${status}`);
        if (priEl) priEl.value = 'none';
      });
    });

    document.querySelectorAll('[data-save]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const status = btn.dataset.save;
        const title = document.getElementById(`input-${status}`).value.trim();
        const notes = document.getElementById(`notes-${status}`).value.trim();
        if (!title) return;
        try {
          const dueEl = document.getElementById(`due-${status}`);
          const priEl = document.getElementById(`priority-${status}`);
          const due_date = dueEl ? dueEl.value.trim() || null : null;
          const priority = priEl ? priEl.value : 'none';
          const res = await fetch(`${API}/tasks`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, notes: notes || null, status, due_date, priority })
          });
          if (!res.ok) throw new Error('Create failed');
          document.getElementById(`form-${status}`).classList.remove('visible');
          document.querySelector(`.add-task[data-status="${status}"]`).style.display = 'block';
          document.getElementById(`input-${status}`).value = '';
          document.getElementById(`notes-${status}`).value = '';
          if (dueEl) dueEl.value = '';
          if (priEl) priEl.value = 'none';
          await fetchTasks();
        } catch (err) {
          console.error(err);
        }
      });
    });

    async function fetchReminders() {
      try {
        const res = await fetch(`${API}/reminders`);
        const data = res.ok ? await res.json() : [];
        renderReminders(data);
      } catch {
        renderReminders([]);
      }
    }
    function renderReminders(list) {
      const el = document.getElementById('cards-reminders');
      if (!el) return;
      el.innerHTML = list.length ? list.map(r => `
        <div class="card" data-id="${r.id}">
          <div class="card-title">${escapeHtml(r.content)}</div>
          <div class="card-meta">${r.next_trigger ? new Date(r.next_trigger).toLocaleString() : '—'}</div>
          <div class="card-actions">
            <button class="btn-icon" data-snooze="${r.id}" title="Snooze">⏰</button>
            <button class="btn-icon" data-done="${r.id}" title="Done">✓</button>
            <button class="btn-icon" data-delete-reminder="${r.id}" title="Delete">×</button>
          </div>
        </div>
      `).join('') : '<div class="empty-state">No reminders</div>';
      el.querySelectorAll('[data-snooze]').forEach(b => b.addEventListener('click', () => snoozeReminder(parseInt(b.dataset.snooze))));
      el.querySelectorAll('[data-done]').forEach(b => b.addEventListener('click', () => doneReminder(parseInt(b.dataset.done))));
      el.querySelectorAll('[data-delete-reminder]').forEach(b => b.addEventListener('click', () => deleteReminder(parseInt(b.dataset.deleteReminder))));
    }
    async function snoozeReminder(id) { try { await fetch(`${API}/reminders/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ snooze_minutes: 60 }) }); fetchReminders(); } catch (e) { console.error(e); } }
    async function doneReminder(id) { try { await fetch(`${API}/reminders/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ is_active: false }) }); fetchReminders(); } catch (e) { console.error(e); } }
    async function deleteReminder(id) { if (!confirm('Delete?')) return; try { await fetch(`${API}/reminders/${id}`, { method: 'DELETE' }); fetchReminders(); } catch (e) { console.error(e); } }

    document.getElementById('add-reminder-btn')?.addEventListener('click', () => {
      document.getElementById('form-reminder').classList.add('visible');
      document.getElementById('add-reminder-btn').style.display = 'none';
      document.getElementById('input-reminder-content').focus();
    });
    document.getElementById('cancel-reminder')?.addEventListener('click', () => {
      document.getElementById('form-reminder').classList.remove('visible');
      document.getElementById('add-reminder-btn').style.display = 'block';
    });
    document.getElementById('save-reminder')?.addEventListener('click', async () => {
      const content = document.getElementById('input-reminder-content').value.trim();
      const trigger_at = document.getElementById('input-reminder-trigger').value.trim();
      if (!content) return;
      try {
        const res = await fetch(`${API}/reminders`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content, trigger_at: trigger_at || null }) });
        if (!res.ok) throw new Error('Failed');
        document.getElementById('form-reminder').classList.remove('visible');
        document.getElementById('add-reminder-btn').style.display = 'block';
        document.getElementById('input-reminder-content').value = '';
        document.getElementById('input-reminder-trigger').value = '';
        fetchReminders();
      } catch (e) { console.error(e); }
    });

    async function fetchInbox() {
      try {
        const query = inboxFilter === 'all' ? '' : `?is_processed=${inboxFilter}`;
        const res = await fetch(`${API}/inbox${query}`);
        const data = res.ok ? await res.json() : [];
        renderInbox(data);
      } catch {
        renderInbox([]);
      }
    }
    function renderInbox(list) {
      const el = document.getElementById('cards-inbox');
      if (!el) return;
      el.innerHTML = list.length ? list.map(i => `
        <div class="card" data-id="${i.id}">
          <div class="card-title">${escapeHtml(i.raw_content?.slice(0, 80) || '—')}</div>
          <div class="card-meta">${i.source_type || 'text'}</div>
          <div class="card-actions">
            <button class="btn-icon" data-process-inbox="${i.id}" title="Process">✓</button>
          </div>
        </div>
      `).join('') : '<div class="empty-state">Inbox empty</div>';
      el.querySelectorAll('[data-process-inbox]').forEach(b => b.addEventListener('click', () => processInbox(parseInt(b.dataset.processInbox))));
    }
    async function processInbox(id) { try { await fetch(`${API}/inbox/${id}/process`, { method: 'POST' }); fetchInbox(); } catch (e) { console.error(e); } }

    document.getElementById('inbox-filter')?.addEventListener('change', (e) => {
      inboxFilter = e.target.value;
      fetchInbox();
    });

    async function fetchMemory() {
      try {
        const res = await fetch(`${API}/memory`);
        const data = res.ok ? await res.json() : [];
        renderMemory(data);
      } catch {
        renderMemory([]);
      }
    }
    function renderMemory(list) {
      const el = document.getElementById('cards-memory');
      if (!el) return;
      el.innerHTML = list.length ? list.map(m => `
        <div class="card" data-id="${m.id}">
          <div class="card-title">${escapeHtml(m.content?.slice(0, 80) || '—')}</div>
          <div class="card-meta">${m.memory_type || 'note'} ${m.event_date ? '· ' + m.event_date : ''}</div>
          <div class="card-actions">
            <button class="btn-icon" data-delete-memory="${m.id}" title="Delete">×</button>
          </div>
        </div>
      `).join('') : '<div class="empty-state">No memories</div>';
      el.querySelectorAll('[data-delete-memory]').forEach(b => b.addEventListener('click', () => deleteMemory(parseInt(b.dataset.deleteMemory))));
    }
    async function deleteMemory(id) { if (!confirm('Delete?')) return; try { await fetch(`${API}/memory/${id}`, { method: 'DELETE' }); fetchMemory(); } catch (e) { console.error(e); } }

    document.getElementById('add-memory-btn')?.addEventListener('click', () => {
      document.getElementById('form-memory').classList.add('visible');
      document.getElementById('add-memory-btn').style.display = 'none';
    });
    document.getElementById('cancel-memory')?.addEventListener('click', () => {
      document.getElementById('form-memory').classList.remove('visible');
      document.getElementById('add-memory-btn').style.display = 'block';
    });
    document.getElementById('save-memory')?.addEventListener('click', async () => {
      const content = document.getElementById('input-memory-content').value.trim();
      const memory_type = document.getElementById('input-memory-type').value;
      const event_date = document.getElementById('input-memory-date').value.trim() || null;
      if (!content) return;
      try {
        const res = await fetch(`${API}/memory`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content, memory_type, event_date }) });
        if (!res.ok) throw new Error('Failed');
        document.getElementById('form-memory').classList.remove('visible');
        document.getElementById('add-memory-btn').style.display = 'block';
        document.getElementById('input-memory-content').value = '';
        document.getElementById('input-memory-date').value = '';
        fetchMemory();
      } catch (e) { console.error(e); }
    });

    async function fetchToday() {
      try {
        const res = await fetch(`${API}/tasks?my_day=true`);
        const data = res.ok ? await res.json() : [];
        renderToday(data);
      } catch {
        renderToday([]);
      }
    }
    function renderToday(list) {
      const el = document.getElementById('cards-today');
      if (!el) return;
      const s = getSettings();
      el.innerHTML = list.length ? list.map(t => {
        const parts = [];
        if (s.showProject && t.project) parts.push(t.project);
        if (s.showDueDate && t.due_date) parts.push(new Date(t.due_date).toLocaleDateString());
        const meta = parts.join(' · ');
        return `
        <div class="card" data-id="${t.id}">
          <div class="card-title">${escapeHtml(t.title)}</div>
          ${meta ? `<div class="card-meta">${escapeHtml(meta)}</div>` : ''}
          <div class="card-actions">
            <button class="btn-icon" data-remove-today="${t.id}" title="Remove from today">×</button>
          </div>
        </div>
      `}).join('') : '<div class="empty-state">Nothing planned for today</div>';
      el.querySelectorAll('[data-remove-today]').forEach(b => b.addEventListener('click', () => removeFromToday(parseInt(b.dataset.removeToday))));
      el.querySelectorAll('.card').forEach(card => card.addEventListener('click', (e) => {
        if (e.target.closest('[data-remove-today]')) return;
        const id = parseInt(card.dataset.id);
        const task = list.find(t => t.id === id);
        if (task) openTaskSidebar(task);
      }));
    }
    async function removeFromToday(id) { try { await fetch(`${API}/tasks/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ my_day: false, my_day_date: null }) }); fetchToday(); } catch (e) { console.error(e); } }

    async function runSearch() {
      const q = document.getElementById('search-input').value.trim();
      const statusEl = document.getElementById('search-status');
      const resultsEl = document.getElementById('search-results');
      if (!q) {
        statusEl.textContent = '';
        statusEl.classList.remove('loading');
        resultsEl.innerHTML = '<div class="empty-state">Enter a search query</div>';
        return;
      }

      statusEl.textContent = 'Searching…';
      statusEl.classList.add('loading');

      try {
        const res = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
        const data = res.ok ? await res.json() : [];
        resultsEl.innerHTML = data.length ? data.map(x => `
          <div class="search-result-item">
            <div class="type">${escapeHtml(x.type || 'item')}</div>
            <div>${escapeHtml(x.title || x.content || '—')}</div>
          </div>
        `).join('') : '<div class="empty-state">No results</div>';
        statusEl.textContent = data.length ? `Found ${data.length} result${data.length === 1 ? '' : 's'}` : 'No results found';
      } catch (e) {
        statusEl.textContent = 'Search not available';
        resultsEl.innerHTML = '<div class="empty-state">Search not available</div>';
      } finally {
        statusEl.classList.remove('loading');
      }
    }

    document.getElementById('search-form')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      await runSearch();
    });


    document.getElementById('close-detail')?.addEventListener('click', () => document.getElementById('task-detail').classList.remove('open'));
    document.getElementById('delete-detail')?.addEventListener('click', async () => {
      if (!selectedTaskId) return;
      document.getElementById('task-detail').classList.remove('open');
      await deleteTask(selectedTaskId);
    });
    document.getElementById('save-detail')?.addEventListener('click', async () => {
      if (!selectedTaskId) return;
      const title = document.getElementById('detail-title').value.trim();
      if (!title) return;
      const notes = document.getElementById('detail-notes').value.trim();
      const status = document.getElementById('detail-status')?.value || undefined;
      const priority = document.getElementById('detail-priority')?.value || 'none';
      const due_date = document.getElementById('detail-due')?.value.trim() || null;
      const project = document.getElementById('detail-project')?.value.trim() ?? '';
      await fetch(`${API}/tasks/${selectedTaskId}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title, notes, status, priority, due_date, project }) });
      await fetchTasks();
      fetchToday?.();
      document.getElementById('task-detail').classList.remove('open');
    });
    document.getElementById('add-subtask')?.addEventListener('click', async () => {
      if (!selectedTaskId) return;
      const input = document.getElementById('new-subtask');
      const title = input.value.trim();
      if (!title) return;
      await fetch(`${API}/tasks`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title, status: 'not_started', parent_id: selectedTaskId }) });
      input.value = '';
      subtasksByParent[selectedTaskId] = await fetchSubtasks(selectedTaskId);
      renderSubtasks(selectedTaskId);
    });

    document.getElementById('sort-select')?.addEventListener('change', (e) => {
      currentSort = e.target.value;
      localStorage.setItem('pantera_sort', currentSort);
      fetchTasks();
    });
    // Init sort select to saved value
    const sortEl = document.getElementById('sort-select');
    if (sortEl) sortEl.value = currentSort;

    // Detail sidebar: star, priority, due date
    document.getElementById('detail-star')?.addEventListener('click', async () => {
      if (!selectedTaskId) return;
      const btn = document.getElementById('detail-star');
      const newVal = btn.textContent.trim() === '☆';
      await fetch(`${API}/tasks/${selectedTaskId}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ is_important: newVal }) });
      btn.textContent = newVal ? '★' : '☆';
      btn.classList.toggle('starred', newVal);
      await fetchTasks();
    });
    document.getElementById('detail-priority')?.addEventListener('change', async (e) => {
      if (!selectedTaskId) return;
      await fetch(`${API}/tasks/${selectedTaskId}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ priority: e.target.value }) });
      await fetchTasks();
    });


    fetchLists();
    fetchTasks().catch(err => {
      document.querySelector('.kanban').innerHTML = `<div class="loading">Could not load tasks. Is the server running?</div>`;
    });
  </script>
</body>
</html>
